<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Pearlist - L'Odyssée ICAM</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Almendra+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    body, h1, h2, h3, button, .brand__title, .hud__label, .hud__value {
      font-family: 'Almendra SC', serif !important;
    }
    body {
      background: #0a0a0a;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
      opacity: 0.7;
      z-index: -1;
    }
    .home-btn {
      position: fixed; top: 15px; left: 15px; width: 45px; height: 45px;
      background: #fff1e0; border-radius: 50%; border: 3px solid #3e2723;
      display: flex; justify-content: center; align-items: center;
      text-decoration: none; font-size: 22px; z-index: 5000; box-shadow: 0 4px 0 #000;
    }
    .hidden { display: none !important; }
    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    #leaderboard-modal .panel--paper {
      max-height: 92vh; display: flex; flex-direction: column; overflow: hidden;
      padding: 20px; width: 90%; max-width: 400px;
    }
    .highscore-list {
      overflow-y: auto; max-height: 250px; margin: 10px 0; padding-right: 5px; list-style: none;
    }
    .settings-btn {
      position: absolute; top: 15px; right: 15px; z-index: 1001;
      cursor: pointer; font-size: 22px; background: rgba(0,0,0,0.6);
      border-radius: 50%; width: 45px; height: 45px;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid #ffb700; color: #ffb700; transition: all 0.2s;
    }
    .btn-gold { background: #ffb700 !important; color: #3e2723 !important; font-weight: bold; border: 2px solid #5d4037; }
    .panel--paper { text-align: center; }
    #error-msg { color: #ff5252; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <a href="../index.html" class="home-btn">🏠</a>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand__title">PEARLIST</span>
        <span class="brand__subtitle">La Grande Régate</span>
      </div>
    </header>

    <main class="layout">
      <aside class="aside-left">
        <div class="logo-container"></div>
      </aside>

      <section class="game-wrap">
        <div id="game-container" class="game-container">
          <div id="btn-settings" class="settings-btn">🔊</div>

          <div id="hud" class="hud hidden" style="left: 20px; transform: none; flex-direction: column; align-items: flex-start; gap: 8px;">
            <div class="hud__pill" style="position: relative;">
              <div class="hud__label">Milles</div>
              <div class="hud__value" id="score-display">0</div>
              <button id="btn-secret-trigger" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: default; border: none; z-index: 10; padding: 0; margin: 0; -webkit-tap-highlight-color: transparent;"></button>
            </div>
            <div class="hud__pill">
              <div class="hud__label">Perles</div>
              <div class="hud__value" id="pearls-display">0</div>
            </div>
          </div>

          <div id="main-menu" class="overlay">
            <div class="panel panel--paper">
              <h1>PEARLIST</h1>
              <p id="auth-status">Embarque avec ton mail ICAM.</p>
              <div id="auth-section">
                <button id="btn-login" class="btn btn-primary btn-lg">🔑 CONNEXION GOOGLE</button>
                <div id="error-msg" class="hidden"></div>
                <button id="btn-logout" class="btn hidden" style="margin-top: 10px; font-size: 0.8rem; border: 1px solid #999;">CHANGER DE COMPTE</button>
              </div>
              <div id="game-controls" class="hidden">
                <button id="btn-play" class="btn btn-primary btn-lg">PRENDRE LA MER</button>
                <button id="btn-howto" class="btn" style="margin-top:12px; width:100%">MANŒUVRES</button>
              </div>
            </div>
          </div>

          <!-- Autres modales (inchangé) -->
          <div id="leaderboard-modal" class="overlay hidden" style="z-index: 2000;">
            <!-- Contenu inchangé -->
          </div>
          <div id="game-over" class="overlay hidden">
            <!-- Contenu inchangé -->
          </div>
          <div id="secret-modal" class="overlay hidden" style="z-index: 3000;">
            <!-- Contenu inchangé -->
          </div>
          <div id="howto" class="overlay hidden">
            <!-- Contenu inchangé -->
          </div>
        </div>
      </section>

      <aside class="sidebar">
        <div class="card card--paper">
          <h3>🏆 Classement</h3>
          <ul id="live-highscore-list" class="highscore-list"></ul>
        </div>
      </aside>
    </main>
  </div>

  <!-- Chargement des bibliothèques dans le bon ordre -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>

  <!-- Scripts de protection -->
  <script>
    // Désactive les outils de développement et le clic droit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J'))) {
        e.preventDefault();
        alert("L'accès aux outils de développement est désactivé pour ce jeu.");
      }
    });
    document.addEventListener('contextmenu', (e) => e.preventDefault());

    // Honeypots pour les commandes console
    window.toggleInvincibility = () => window.logCheatAttempt?.("consoleCheat", { command: "toggleInvincibility" });
    window.setScore = (score) => window.logCheatAttempt?.("consoleCheat", { command: "setScore", attemptedScore: score });
    window.removeObstacles = () => window.logCheatAttempt?.("consoleCheat", { command: "removeObstacles" });

    // Détecte les modifications du DOM
    function setupDomTamperingDetection() {
      if (!window.GameState) {
        setTimeout(setupDomTamperingDetection, 1000);
        return;
      }
      const scoreDisplay = document.getElementById("score-display");
      const pearlsDisplay = document.getElementById("pearls-display");
      setInterval(() => {
        if (scoreDisplay && pearlsDisplay && window.GameState) {
          const currentScore = parseInt(scoreDisplay.textContent);
          const currentPearls = parseInt(pearlsDisplay.textContent);
          if (currentScore !== window.GameState.getScore() || currentPearls !== window.GameState.getPearls()) {
            window.logCheatAttempt?.("domTampering", {
              expectedScore: window.GameState.getScore(),
              displayedScore: currentScore
            });
          }
        }
      }, 1000);
    }
    window.addEventListener('load', () => setTimeout(setupDomTamperingDetection, 2000));
  </script>

  <!-- Chargement du jeu -->
  <script type="module" src="game.js"></script>
</body>
</html>
