<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Pearlist - L'Odyssée ICAM</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Almendra+SC&display=swap" rel="stylesheet">
  <style>
    body, h1, h2, h3, button, .brand__title, .hud__label, .hud__value {
      font-family: 'Almendra SC', serif !important;
    }
    body {
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
      margin: 0;
      padding: 0;
      height: 100vh;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
      opacity: 0.7;
      z-index: -1;
    }
    .home-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      width: 45px;
      height: 45px;
      background: #fff1e0;
      border-radius: 50%;
      border: 3px solid #3e2723;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      font-size: 22px;
      z-index: 5000;
      box-shadow: 0 4px 0 #000;
    }
    .hidden { display: none !important; }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .panel--paper {
      text-align: center;
      width: 90%;
      max-width: 400px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px; /* Bordures arrondies */
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .highscore-list {
      overflow-y: auto;
      max-height: 250px;
      margin: 10px 0;
      list-style: none;
      padding: 0;
    }
    .highscore-list li {
      display: flex;
      justify-content: space-between;
      padding: 5px 10px;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .settings-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 1001;
      cursor: pointer;
      font-size: 22px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ffb700;
      color: #ffb700;
    }
    .btn {
      background: #ffb700;
      color: #3e2723;
      border: none;
      padding: 10px 20px;
      margin: 10px 0;
      border-radius: 8px; /* Boutons arrondis */
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      transform: scale(1.05);
    }
    .btn-primary {
      background: #d32f2f;
      color: white;
    }
    .btn-gold {
      background: #ffb700 !important;
      color: #3e2723 !important;
      font-weight: bold;
    }
    #error-msg {
      color: #ff5252;
      background: rgba(0,0,0,0.2);
      padding: 5px;
      border-radius: 8px;
      margin: 5px 0;
      font-size: 0.8rem;
    }
    #game-container {
      width: 480px;
      height: 720px;
      margin: 0 auto;
      position: relative;
    }
    .hud {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .hud__pill {
      background: rgba(0,0,0,0.7);
      padding: 10px 15px;
      border-radius: 20px;
      position: relative;
    }
    .hud__label {
      font-size: 0.8rem;
      color: #ffb700;
      margin-bottom: 5px;
    }
    .hud__value {
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
    }
  </style>
  <script>
    // Blocage F12 SANS message
    document.addEventListener('keydown', (e) => {
      if (
        e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
        (e.ctrlKey && e.key === 'u')
      ) {
        e.preventDefault();
      }
    });

    // Empêche le clic droit
    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
    });
  </script>
</head>
<body>
  <a href="../index.html" class="home-btn">🏠</a>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand__title">PEARLIST</span>
        <span class="brand__subtitle">La Grande Régate</span>
      </div>
    </header>

    <main class="layout">
      <aside class="aside-left">
        <div class="logo-container"></div>
      </aside>

      <section class="game-wrap">
        <div id="game-container" class="game-container">
          <div id="btn-settings" class="settings-btn">🔊</div>

          <div id="hud" class="hud hidden" style="left: 20px; transform: none; flex-direction: column; align-items: flex-start; gap: 8px;">
            <div class="hud__pill" style="position: relative;">
              <div class="hud__label">Milles</div>
              <div class="hud__value" id="score-display">0</div>
              <button id="btn-secret-trigger" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; z-index: 10; cursor: pointer;"></button>
            </div>
            <div class="hud__pill">
              <div class="hud__label">Perles</div>
              <div class="hud__value" id="pearls-display">0</div>
            </div>
          </div>

          <!-- Menu principal avec bordures arrondies -->
          <div id="main-menu" class="overlay">
            <div class="panel--paper">
              <h1>PEARLIST</h1>
              <p id="auth-status">Embarque avec ton mail ICAM.</p>
              <div id="auth-section">
                 <button id="btn-login" class="btn btn-primary btn-lg">🔑 CONNEXION GOOGLE</button>
                 <div id="error-msg" class="hidden"></div>
                 <button id="btn-logout" class="btn hidden" style="margin-top: 10px; font-size: 0.8rem;">CHANGER DE COMPTE</button>
              </div>
              <div id="game-controls" class="hidden">
                <button id="btn-play" class="btn btn-primary btn-lg">PRENDRE LA MER</button>
                <button id="btn-howto" class="btn" style="margin-top:12px; width:100%">MANŒUVRES</button>
              </div>
            </div>
          </div>

          <!-- Leaderboard modal -->
          <div id="leaderboard-modal" class="overlay hidden" style="z-index: 2000;">
            <div class="panel--paper" style="position: relative;">
              <button id="close-modal-x" style="position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 32px; cursor: pointer;">&times;</button>
              <div id="view-rankings">
                <h2>🏆 TOP MILLES</h2>
                <ul id="modal-highscore-list" class="highscore-list"></ul>
                <button id="btn-show-prizes" class="btn btn-gold" style="width: 100%; margin-bottom: 10px;">🎁 VOIR LES TRÉSORS</button>
                <button id="btn-close-modal" class="btn btn-primary" style="width: 100%;">RETOUR</button>
              </div>
            </div>
          </div>

          <!-- Game Over modal -->
          <div id="game-over" class="overlay hidden">
            <div class="panel--paper">
              <h2 style="color: #d32f2f;">NAUFRAGE !</h2>
              <p><span id="player-name-end">Marin</span> a parcouru :</p>
              <h1 id="final-score" style="font-size: 3.5rem;">0</h1>
              <button id="btn-restart" class="btn btn-primary btn-lg" style="width:100%">RÉESSAYER</button>
              <button id="btn-show-leaderboard" class="btn" style="margin-top:10px; width:100%">CLASSEMENT</button>
            </div>
          </div>

          <!-- Secret modal -->
          <div id="secret-modal" class="overlay hidden" style="z-index: 3000;">
              <div class="panel--paper">
                <h2>📜 CLEF DE DÉCHIFFRAGE</h2>
                <h1 id="decryption-key">suzie</h1>
                <button id="btn-close-secret" class="btn btn-gold" style="width:100%">REPRENDRE</button>
              </div>
          </div>

          <!-- How To modal -->
          <div id="howto" class="overlay hidden">
            <div class="panel--paper">
              <h2>Manœuvres</h2>
              <p>Swipe ou clique pour changer de file !</p>
              <button id="btn-back-menu" class="btn btn-primary">RETOUR</button>
            </div>
          </div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar">
          <div class="card card--paper">
            <h3>🏆 Classement</h3>
            <ul id="live-highscore-list" class="highscore-list"></ul>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
